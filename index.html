<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenneth and Kimberly Wedding</title>
  
  <meta property="og:title" content="Kenneth & Kimberly Wedding Invitation" />
  <meta property="og:description" content="You're invited! October 24, 2026." />
  <meta property="og:image" content="https://kenneth-kimberly-wedding-invitation.vercel.app/preview.jpg" />
  <meta property="og:url" content="https://kenneth-kimberly-wedding-invitation.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Wedding Invitation" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>You're Invited!</h1>
    
    <div id="countdown">
      <div class="countdown-item">
        <span id="months">00</span>
        <span class="label">Months</span>
      </div>
      <div class="countdown-item">
        <span id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="countdown-item">
        <span id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="countdown-item">
        <span id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
    </div>

    <div class="calendar-wrapper">
      <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=Kenneth+and+Kimberly+Wedding&dates=20261024T140000/20261024T150000&details=You+are+cordially+invited+to+celebrate+the+wedding+of+Kenneth+and+Kimberly!&location=Please+check+invitation+for+details" 
         target="_blank" 
         class="calendar-btn">
         📅 Add to Google Calendar
      </a>
      
      <button id="music-control" class="music-btn-inline">🎵 Play Music</button>
    </div>
  </header>

  <div class="container">
    <img src="1.png" alt="Image 1" />
    <img src="2.png" alt="Image 2" />
    <img src="3.png" alt="Image 3" />
    <img src="4.png" alt="Image 4" />
    <img src="5.png" alt="Image 5" />
  </div>

  <audio id="music" loop preload="auto">
    <source src="instrumental.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const audio = document.getElementById("music");
    const musicBtn = document.getElementById("music-control");
    let hasInteracted = false;

    // Toggle Play/Pause on Click
    musicBtn.addEventListener("click", () => {
      hasInteracted = true; // Mark that user interacted
      if (audio.paused) {
        audio.play().then(() => {
          musicBtn.innerHTML = "⏸ Stop Music";
        }).catch(err => console.log("Playback failed"));
      } else {
        audio.pause();
        musicBtn.innerHTML = "🎵 Play Music";
      }
    });

    // Auto-try on first scroll
    const tryAutoPlay = () => {
      if (!hasInteracted) {
        audio.play().then(() => {
          musicBtn.innerHTML = "⏸ Stop Music";
          hasInteracted = true;
          window.removeEventListener("scroll", tryAutoPlay);
        }).catch(() => {
          // If browser still blocks it, we just wait for the button click
        });
      }
    };
    window.addEventListener("scroll", tryAutoPlay, { passive: true });

    // Countdown Logic
    function updateCountdown() {
      const targetDate = new Date("2026-10-24T14:00:00").getTime();
      const now = new Date().getTime();
      const timeLeft = targetDate - now;

      if (timeLeft > 0) {
        const months = Math.floor(timeLeft / (1000 * 60 * 60 * 24 * 30.44));
        const days = Math.floor((timeLeft % (1000 * 60 * 60 * 24 * 30.44)) / (1000 * 60 * 60 * 24));
        const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("months").textContent = months.toString().padStart(2, "0");
        document.getElementById("days").textContent = days.toString().padStart(2, "0");
        document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
        document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
      } else {
        document.getElementById("countdown").innerHTML = "<span>The big day is here!</span>";
      }
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
